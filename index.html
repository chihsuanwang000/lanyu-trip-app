function expenseCalc(){
  const total=state.expenses.reduce((s,e)=>s+Number(e.amount||0),0);

  const summary=members.map(m=>{
    const paid=state.expenses
      .filter(e=>e.payer===m)
      .reduce((s,e)=>s+Number(e.amount||0),0);

    const shouldPay=state.expenses.reduce((s,e)=>{
      const sw=e.splitWith?.length?e.splitWith:members;
      return sw.includes(m)?s+Number(e.amount||0)/sw.length:s;
    },0);

    return{member:m,paid,shouldPay,balance:paid-shouldPay};
  });

  // 代表人結算：個人分帳仍保留，但實際匯款由代表人統一收付。
  const representativeBalance={};
  summary.forEach(item=>{
    const rep=getPaymentRepresentative(item.member);
    representativeBalance[rep]=(representativeBalance[rep]||0)+item.balance;
  });

  let debtors=Object.entries(representativeBalance)
    .filter(([name,balance])=>balance<-1)
    .map(([name,balance])=>({name,amount:Math.round(Math.abs(balance))}));

  let creditors=Object.entries(representativeBalance)
    .filter(([name,balance])=>balance>1)
    .map(([name,balance])=>({name,amount:Math.round(balance)}));

  let settlements=[],i=0,j=0;
  while(i<debtors.length&&j<creditors.length){
    let a=Math.min(debtors[i].amount,creditors[j].amount);
    if(a>0)settlements.push({
      from:debtors[i].name,
      to:creditors[j].name,
      amount:a,
      fromLabel:getRepresentativeDisplayName(debtors[i].name),
      toLabel:getRepresentativeDisplayName(creditors[j].name)
    });
    debtors[i].amount-=a;
    creditors[j].amount-=a;
    if(debtors[i].amount<=0)i++;
    if(creditors[j].amount<=0)j++;
  }

  return{total,summary,settlements,representativeBalance};
}

function rerenderKeepScroll(fn){
  const y = window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0;
  fn();
  const restore = () => window.scrollTo({ top: y, left: 0, behavior: 'auto' });
  restore();
  requestAnimationFrame(restore);
  setTimeout(restore, 0);
  setTimeout(restore, 60);
}

function htmlEscape(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function attrEscape(v){return htmlEscape(v)}
function jsArg(v){return String(v??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ')}
function normalizeExpense(row){
  const split = Array.isArray(row.splitWith) ? row.splitWith : (row.splitWith ? String(row.splitWith).split(',') : []);
  return {id:String(row.id||''),payer:row.payer||'',item:row.item||'',amount:Number(row.amount||0),category:row.category||'其他',splitWith:split.map(x=>String(x).trim()).filter(Boolean)};
}
async function loadExpensesFromAPI(){
  const res = await fetch(API_URL + '?action=list&t=' + Date.now(), { method:'GET', cache:'no-store' });
  if(!res.ok) throw new Error('HTTP '+res.status);

  const data = await res.json();
  const rows = Array.isArray(data) ? data : (data && Array.isArray(data.data) ? data.data : []);
  state.expenses = rows.map(normalizeExpense).filter(e=>e.item);
  state.apiStatus='已同步 Google Sheets（可修改／刪除）';
  renderExpense();
  return state.expenses;
}
async function postToAPI(payload){
  // 最穩定版：用隱藏表單 POST 到 Apps Script iframe。
  // 避免手機瀏覽器 / GitHub Pages / Apps Script 的 CORS 限制導致資料庫沒有真的更新。
  return new Promise((resolve, reject) => {
    try {
      const iframeName = 'gs_hidden_iframe_' + Date.now();

      const iframe = document.createElement('iframe');
      iframe.name = iframeName;
      iframe.style.display = 'none';
      document.body.appendChild(iframe);

      const form = document.createElement('form');
      form.method = 'POST';
      form.action = API_URL;
      form.target = iframeName;
      form.style.display = 'none';

      const input = document.createElement('input');
      input.type = 'hidden';
      input.name = 'payload';
      input.value = JSON.stringify(payload);
      form.appendChild(input);

      document.body.appendChild(form);
      form.submit();

      // Apps Script iframe 回傳內容不能穩定被前端讀取，所以以送出成功為準，
      // 接著重新讀取 Google Sheets 來確認最新資料。
      setTimeout(() => {
        try {
          form.remove();
          iframe.remove();
        } catch(e) {}
        resolve({ success:true });
      }, 900);

    } catch (err) {
      reject(err);
    }
  });
}
function syncForm(){['payer','item','amount','category'].forEach(id=>{const el=document.getElementById(id); if(el)state.form[id]=el.value})}

  state.editingId=String(e.id);
  state.form={payer:e.payer||'',item:e.item||'',amount:String(e.amount||''),category:e.category||'',splitWith:[...(e.splitWith&&e.splitWith.length?e.splitWith:members)]};
  state.apiStatus='正在修改既有記帳';
  renderExpense();
  setTimeout(()=>document.getElementById('expense-form')?.scrollIntoView({behavior:'smooth',block:'start'}),50);
}
function cancelEditExpense(){resetExpenseForm();state.apiStatus='已取消修改';renderExpense()}
async function saveExpense(){
  syncForm();

  const amount=Number(state.form.amount);
  const isEditing=state.editingId!==null && state.editingId!==undefined;

  if(!state.form.payer){
    state.apiStatus='請選擇付款人';
    renderExpense();
    return;
  }

  if(!state.form.category){
    state.apiStatus='請選擇分類';
    renderExpense();
    return;
  }

  if(!state.form.item.trim()||!amount||!state.form.splitWith.length){
    state.apiStatus='請填寫項目、金額與分帳對象';
    renderExpense();
    return;
  }

  const payload={
    action:isEditing?'update':'add',
    id:isEditing?String(state.editingId):undefined,
    payer:state.form.payer,
    item:state.form.item.trim(),
    amount,
    category:state.form.category,
    splitWith:[...state.form.splitWith]
  };

  state.isSaving=true;
  state.apiStatus=isEditing?'更新中…':'寫入中…';
  renderExpense();

  try{
    await postToAPI(payload);

    state.apiStatus=isEditing?'已更新，正在重新同步…':'已寫入，正在重新同步…';
    resetExpenseForm();
    renderExpense();

    setTimeout(()=>{loadExpensesFromAPI().catch(err=>{console.error(err);state.apiStatus='重新同步失敗，請按重新同步';renderExpense();});},1200);

  }catch(err){
    console.error(err);
    state.isSaving=false;
    state.apiStatus=isEditing?'更新送出失敗，請重新同步後確認':'寫入送出失敗，請重新同步後確認';
    renderExpense();
  }
}
async function removeExpense(id){
  if(!confirm('確定要刪除這筆記帳嗎？')) return;
  state.isSaving=true;
  state.apiStatus='刪除中…';
  renderExpense();
  try{
    await postToAPI({action:'delete',id:String(id)});
    state.expenses=state.expenses.filter(e=>String(e.id)!==String(id));
    if(String(state.editingId)===String(id)) resetExpenseForm();
    state.isSaving=false;
    state.apiStatus='已從 Google Sheets 刪除，正在重新同步…';
    renderExpense();
    setTimeout(loadExpensesFromAPI, 1200);
  }catch(err){
    console.error(err);
    state.isSaving=false;
    state.apiStatus='刪除送出失敗，請重新同步後確認';
    renderExpense();
  }
}
